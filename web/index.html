<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMCC 集群管理面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-900">GMCC 集群管理</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="cluster-status-badge" class="px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800">
                        运行中
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm font-medium text-gray-500">总实例</div>
                <div id="stat-total" class="mt-2 text-3xl font-bold text-gray-900">-</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm font-medium text-gray-500">运行中</div>
                <div id="stat-running" class="mt-2 text-3xl font-bold text-green-600">-</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm font-medium text-gray-500">已停止</div>
                <div id="stat-stopped" class="mt-2 text-3xl font-bold text-gray-600">-</div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="text-sm font-medium text-gray-500">运行时长</div>
                <div id="stat-uptime" class="mt-2 text-3xl font-bold text-primary">-</div>
            </div>
        </div>

        <!-- 账号列表 -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-medium text-gray-900">账号列表</h2>
                <button onclick="showAddAccountModal()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600 text-sm font-medium">
                    添加账号
                </button>
            </div>
            <div id="accounts-list" class="divide-y divide-gray-200">
                <!-- 动态加载 -->
            </div>
        </div>
    </main>

    <!-- 密码输入 Modal -->
    <div id="password-modal" class="fixed inset-0 bg-gray-500 bg-opacity-75 hidden">
        <div class="flex items-center justify-center min-h-screen">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-lg font-medium text-gray-900">验证操作密码</h3>
                </div>
                <div class="px-6 py-4">
                    <p class="text-sm text-gray-600 mb-4">请输入操作密码以执行敏感操作</p>
                    <input type="password" id="password-input" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                           placeholder="输入密码">
                    <p id="password-error" class="mt-2 text-sm text-red-600 hidden"></p>
                </div>
                <div class="px-6 py-4 border-t flex justify-end space-x-3">
                    <button onclick="closePasswordModal()" class="px-4 py-2 text-gray-700 hover:text-gray-900">
                        取消
                    </button>
                    <button onclick="submitPassword()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600">
                        确认
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加账号 Modal -->
    <div id="add-account-modal" class="fixed inset-0 bg-gray-500 bg-opacity-75 hidden">
        <div class="flex items-center justify-center min-h-screen">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-lg font-medium text-gray-900">添加新账号</h3>
                </div>
                <div class="px-6 py-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">账号ID</label>
                        <input type="text" id="account-id" 
                               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                               placeholder="例如：bot_001">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">玩家ID</label>
                        <input type="text" id="account-player-id" 
                               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                               placeholder="例如：PlayerName">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">服务器地址</label>
                        <input type="text" id="account-server" 
                               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                               placeholder="例如：127.0.0.1:25565">
                    </div>
                    <div>
                        <label class="flex items-center">
                            <input type="checkbox" id="account-official-auth" class="mr-2">
                            <span class="text-sm text-gray-700">使用正版认证</span>
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">操作密码</label>
                        <input type="password" id="account-password" 
                               class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"
                               placeholder="输入操作密码">
                    </div>
                    <p id="add-account-error" class="text-sm text-red-600 hidden"></p>
                </div>
                <div class="px-6 py-4 border-t flex justify-end space-x-3">
                    <button onclick="closeAddAccountModal()" class="px-4 py-2 text-gray-700 hover:text-gray-900">
                        取消
                    </button>
                    <button onclick="submitAddAccount()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-blue-600">
                        添加
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast-container" class="fixed bottom-4 right-4 space-y-2"></div>

    <script src="/assets/js/app.js"></script>
</body>
</html>
